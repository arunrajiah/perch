name: Release

# M-1 (security): All action references are pinned to exact commit SHAs.
# Update via: gh api repos/<owner>/<repo>/git/refs/tags/<tag> --jq '.object.sha'

on:
  push:
    tags:
      - 'v*.*.*'

# L-6: Deny all permissions globally; jobs declare only what they need.
permissions: {}

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/birdecho-release.keystore

      - name: Verify JS bundle (surface Metro errors early)
        run: npx expo export:embed --eager --platform android --dev false

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/birdecho-release.keystore" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      # M-4: Wipe the keystore from disk immediately after signing.
      # Runs even on failure so the file is never left behind.
      - name: Delete keystore
        if: always()
        run: rm -f android/app/birdecho-release.keystore

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk birdecho.apk

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BirdEcho ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: birdecho.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
