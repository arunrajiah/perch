name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS cloud
        run: eas build --platform android --profile preview --non-interactive --wait

      - name: Download APK from EAS
        id: eas
        run: |
          BUILD_URL=$(eas build:list \
            --platform android \
            --limit 1 \
            --non-interactive \
            --json \
            2>/dev/null | python3 -c \
            "import sys,json; b=json.load(sys.stdin); print(b[0]['artifacts']['buildUrl'])")
          echo "url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          curl -L "$BUILD_URL" -o perch.apk

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Perch ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: perch.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
